<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Web Design & Development, Graphics Design and Digital Solutions | Synlotech Technologies</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="thumbnails/Asset 3.svg" type="image/x-icon">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#2563EB', 
            accent: '#38BDF8',
            dark: '#020617',
          },
          animation: {
            'spin-slow': 'spin 8s linear infinite',
            'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          }
        }
      }
    }
  </script>

  <style>
    @keyframes scanline {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100vh); }
    }
    .scanline {
      width: 100%;
      height: 100px;
      z-index: 10;
      background: linear-gradient(0deg, rgba(37, 99, 235, 0.05) 0%, transparent 100%);
      position: absolute;
      animation: scanline 4s linear infinite;
    }
    .glitch { text-shadow: 2px 0 #2563EB, -2px 0 #38BDF8; }
  </style>
</head>

<body class="bg-[#020202] flex items-center justify-center min-h-screen overflow-hidden font-mono">

  <!-- HUD Scanline Overlay -->
  <div class="scanline"></div>

  <!-- Loader Overlay -->
  <div id="loader" class="fixed inset-0 flex flex-col items-center justify-center bg-[#020202] z-50">
    
    <!-- Ambient Neural Glow -->
    <div class="absolute w-[600px] h-[600px] bg-primary/10 blur-[150px] rounded-full"></div>

    <!-- REACTOR CORE ASSEMBLY -->
    <div class="relative flex flex-col items-center">
      
      <!-- Outer Rotating Ring -->
      <div class="absolute w-80 h-80 border-2 border-dashed border-white/10 rounded-full animate-spin-slow"></div>
      
      <!-- Inner Progress Ring -->
      <svg class="w-72 h-72 transform -rotate-90">
        <circle cx="144" cy="144" r="130" stroke="currentColor" stroke-width="2" fill="transparent" class="text-white/5" />
        <circle id="progress-circle" cx="144" cy="144" r="130" stroke="currentColor" stroke-width="4" fill="transparent" 
                stroke-dasharray="816" stroke-dashoffset="816" class="text-primary transition-all duration-300 ease-out shadow-[0_0_20px_rgba(37,99,235,0.8)]" />
      </svg>

      <!-- CENTER IMAGE MODULE -->
      <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2">
        <div class="relative p-1 rounded-full bg-gradient-to-tr from-primary via-white/20 to-accent group">
          <div class="overflow-hidden rounded-full bg-black border-4 border-black w-32 h-32 flex items-center justify-center">
            <img src="thumbnails/Asset 3.svg" class="w-16 h-20 object-contain animate-pulse-fast brightness-150">
          </div>
        </div>
      </div>

      <!-- PERCENTAGE READOUT -->
      <div class="absolute -bottom-16 text-center">
        <div class="text-5xl font-black text-white tracking-tighter italic glitch">
            <span id="percent">00</span>%
        </div>
        <div class="mt-2 text-[10px] text-primary tracking-[0.4em] uppercase font-bold">
            Synlotech_Engine_Active
        </div>
      </div>

    </div>

    <!-- TERMINAL LOGS (Bottom Left) -->
    <div class="fixed bottom-10 left-10 hidden md:block max-w-xs">
        <div id="logs" class="text-[9px] text-white/30 space-y-1">
            <p>> initializing_kernel_v4.0.2</p>
            <p>> establishing_secure_handshake</p>
            <p>> mapping_neural_nodes</p>
        </div>
    </div>

    <!-- VERSION TAG (Bottom Right) -->
    <div class="fixed bottom-10 right-10">
        <span class="text-[9px] font-bold text-white/10 tracking-[0.5em] uppercase">Architecture // Synlotech_OS</span>
    </div>
  </div>

  <script>
    const percentEl = document.getElementById("percent");
    const circleEl = document.getElementById("progress-circle");
    const logsEl = document.getElementById("logs");
    
    let count = 0;
    const dashArray = 816; // 2 * PI * R (130)

    const logMessages = [
        "> loading_assets_optimized",
        "> deploying_ui_infrastructure",
        "> establishing_synlotech_link",
        "> protocol_override_complete",
        "> system_ready_for_deployment"
    ];

    function updateLoader() {
      if (count <= 100) {
        // Update Percentage
        percentEl.textContent = count.toString().padStart(2, '0');
        
        // Update Circle Dash Offset
        const offset = dashArray - (count / 100) * dashArray;
        circleEl.style.strokeDashoffset = offset;

        // Add Log Messages occasionally
        if (count % 20 === 0 && count > 0) {
            const newLog = document.createElement("p");
            newLog.textContent = logMessages[(count/20)-1];
            newLog.className = "text-accent font-bold";
            logsEl.appendChild(newLog);
        }

        count++;
        let speed = Math.random() * 40 + 20; // Varied speed for realism
        setTimeout(updateLoader, speed);
      } else {
        // Finalize
        percentEl.classList.add("text-accent");
        setTimeout(() => {
            window.location.href = "homepage.html";
        }, 800);
      }
    }

    // Start boot sequence
    window.onload = updateLoader;
  </script>

</body>
</html>
