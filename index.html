<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synlotech Technologies | Loading</title>
  <!-- Official Tailwind CSS v4 CDN Play Script -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="thumbnails/Asset 3.svg" type="image/x-icon">
</head>
<body class="bg-slate-950 text-slate-200 flex flex-col items-center justify-center min-h-screen font-sans p-6 overflow-hidden select-none antialiased relative">

  <!-- Ambient Glow -->
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-sky-500/10 rounded-full blur-3xl pointer-events-none"></div>

  <!-- Main Card Container -->
  <div class="w-full max-w-sm bg-slate-900/40 backdrop-blur-xl border border-slate-800/80 rounded-2xl p-8 shadow-2xl z-10 flex flex-col items-center text-center">
    
       <!-- App Icon / Logo -->
    <div class="mb-6">
      <div class="w-32 max-h-32 rounded-2xl bg-transparent flex items-center justify-center overflow-hidden">
        <!-- Replaced SVG with an Image Element -->
        <img 
          src="thumbnails/Asset 3.svg" 
          alt="Synlotech Logo" 
          class="w-full h-full object-cover p-3"
        />
      </div>
    </div>


    <!-- Headers -->
    <h1 class="text-xl font-serif font-bold tracking-tight uppercase text-white mb-1">Synlotech Technologies</h1>
    <p class="text-xs text-slate-400 mb-6">Preparing your environment...</p>

    <!-- Progress Track -->
    <div class="w-full bg-slate-950 rounded-full h-1.5 border border-slate-800/60 mb-3 overflow-hidden">
      <div id="progress-bar" class="bg-gradient-to-r from-sky-400 to-blue-500 h-full w-0 transition-all duration-100 ease-out"></div>
    </div>

    <!-- Status Output -->
    <div class="w-full flex justify-between items-center text-[11px] font-mono text-slate-500">
      <span id="status-text">Connecting to infrastructure...</span>
      <span id="percentage-text" class="text-sky-400 font-bold">0%</span>
    </div>

   
  </div>

  <!-- Footer -->
  <p class="mt-6 text-[10px] text-slate-600 tracking-wide">&copy; 2026 Synlotech Technologies.</p>

  <script>
    const progressBar = document.getElementById("progress-bar");
    const statusText = document.getElementById("status-text");
    const percentageText = document.getElementById("percentage-text");

    // Human phrases triggered at specific ranges
    const statusPhrases = [
      { upTo: 30, text: "Initializing framework..." },
      { upTo: 60, text: "Syncing secure cloud nodes..." },
      { upTo: 90, text: "Optimizing layout parameters..." },
      { upTo: 100, text: "Final checks complete!" }
    ];

    let progress = 0;
    const totalDuration = 5000; // Exact 5 seconds
    const intervalTime = 50; // Update UI every 50ms
    const stepIncrement = (intervalTime / totalDuration) * 100;

    const loader = setInterval(() => {
      progress += stepIncrement;

      if (progress >= 100) {
        progress = 100;
        clearInterval(loader);
        
        // Final presentation update before redirect
        progressBar.style.width = "100%";
        percentageText.textContent = "100%";
        statusText.textContent = "Redirecting...";
        statusText.className = "text-emerald-400 font-mono text-[11px] font-bold";
        
        setTimeout(() => {
          window.location.href = "homepage.html";
        }, 400); // Tiny pause at 100% for aesthetic closure
      } else {
        // Main updates
        const displayVal = Math.floor(progress);
        progressBar.style.width = `${displayVal}%`;
        percentageText.textContent = `${displayVal}%`;

        // Match current percentage to right descriptive phrase
        const activePhrase = statusPhrases.find(p => displayVal <= p.upTo);
        if (activePhrase) {
          statusText.textContent = activePhrase.text;
        }
      }
    }, intervalTime);
  </script>
</body>
</html>
