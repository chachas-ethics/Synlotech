<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synlotech Loader</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" class="rounded-full" href="thumbnails/theS.png" type="image/x-icon">

   <!-- TAILWIND CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- CUSTOM CONFIG -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#2563EB', 
            accent: '#38BDF8',
            dark: '#020617',
          }
        }
      }
    }
  </script>
  <style>
    /* Optional: smoother typing cursor */
    @keyframes blink {
      0%, 50%, 100% { opacity: 1; }
      25%, 75% { opacity: 0; }
    }
    .cursor {
      display: inline-block;
      width: 1ch;
      animation: blink 1s infinite;
    }
  </style>
</head>
<body style="font-family: inter;" class="bg-primary">

  <!-- Loader Overlay -->
  <div id="loader" class="fixed inset-0 flex flex-col items-center justify-center bg-black/90 z-50">
    <!-- Logo / Brand Text -->
    <img style="height: 150px;
    " loading="lazy" src="thumbnails/theS.png">
    <h1 class="text-accent text-3xl font-bold mb-10 mt-5 text-center">SYNLOTECH TECHNOLOGIES</h1>
    
    <!-- Typing Text -->
    <div class="text-accent text-xl font-medium p-6">
      <span id="typing-text"></span><span class="cursor">|</span>
    </div>
  </div>


  <script>
    const text = "Transforming Ideas into Digital Reality";
    const typingElement = document.getElementById("typing-text");
    let index = 0;

    function type() {
      if (index < text.length) {
        typingElement.textContent += text[index];
        index++;
        setTimeout(type, 100); // typing speed
      } else {
        // Optional loop typing after pause
        setTimeout(() => {
          typingElement.textContent = "";
          index = 0;
          type();
        }, 1500);
      }
    }

    type();

    // Hide loader when page is fully loaded
   window.addEventListener("load", () => {
  const minTime = 3000; // 3 seconds
  const elapsed = Date.now() - startTime; // track start time
  const remaining = Math.max(minTime - elapsed, 0);

  setTimeout(() => {
    document.getElementById("loader").style.display = "none";
    document.getElementById("content").classList.remove("hidden");
  }, remaining);
});

/* redirect after 4 seconds */
setTimeout(function(){
  window.location.href = "homepage.html"; 
}, 5000);
  </script>

</body>
</html>
